<ion-content [fullscreen]="true" style="--background: var(--color-navy)">
  <pm-header />

  <!-- ── Dark hero block (fills status-bar + header + hero) ── -->
  <div class="bg-navy relative overflow-hidden pb-[96px]">


    <!-- Orange glow -->
    <div class="pointer-events-none absolute -top-[120px] -left-[160px] w-[467px] h-[341px] rounded-full bg-orange/22 blur-[60px]"></div>
    <!-- Navy-band glow -->
    <div class="pointer-events-none absolute bottom-0 -left-[60px] w-[520px] h-[240px] rounded-full bg-[rgba(77,89,128,0.35)] blur-[50px]"></div>

    <!-- Hero text -->
    <section class="relative z-[1] px-7 pt-9">
      <h1 class="font-black leading-[1.04] text-white text-[42px] animate-rise">
        <span class="block">Practical</span>
        <span class="block">Machinist</span>
        <span class="block text-orange">Trivia.</span>
      </h1>
      <p class="mt-5 text-[14px] leading-[1.55] text-white/70 max-w-xs animate-rise">
        {{ 'REGISTER.HERO_SUBTITLE' | translate }}
      </p>
    </section>

  </div>

  <!-- ── Light content area (form + footnote) ── -->
  <div class="bg-paper -mt-[74px] relative z-10 pb-10">

    <!-- Form card -->
    <form [formGroup]="form" (ngSubmit)="submit()"
          class="mx-6 bg-white rounded-[28px] p-8 shadow-[0_12px_40px_-8px_rgba(15,23,41,0.1)] border border-line animate-rise">

      <h2 class="text-[22px] font-black text-ink mb-[18px]">{{ 'REGISTER.FORM_TITLE' | translate }}</h2>

      <div class="mb-3">
        <label class="pm-label">{{ 'REGISTER.FIRST_NAME' | translate }} <span class="text-orange">*</span></label>
        <input class="pm-input" type="text" formControlName="firstName" placeholder="Jake" autocomplete="given-name" />
      </div>
      <div class="mb-3">
        <label class="pm-label">{{ 'REGISTER.LAST_NAME' | translate }} <span class="text-orange">*</span></label>
        <input class="pm-input" type="text" formControlName="lastName" placeholder="Thompson" autocomplete="family-name" />
      </div>
      <div class="mb-3">
        <label class="pm-label">{{ 'REGISTER.EMAIL' | translate }} <span class="text-orange">*</span></label>
        <input class="pm-input" type="email" formControlName="email" placeholder="you@company.com" autocomplete="email" />
      </div>
      <div class="mb-3">
        <label class="pm-label">{{ 'REGISTER.COMPANY' | translate }} <span class="text-orange">*</span></label>
        <input class="pm-input" type="text" formControlName="company" placeholder="Company Name" autocomplete="organization" />
      </div>
      <div class="mb-3">
        <label class="pm-label">{{ 'REGISTER.PHONE' | translate }} <span class="text-orange">*</span></label>
        <input class="pm-input" type="tel" formControlName="phone" placeholder="(555) 123-4567" autocomplete="tel" />
      </div>

      @if (hasError()) {
        <p class="mt-1.5 text-xs text-wrong">{{ errorMessage() ?? ('REGISTER.ERROR_GENERIC' | translate) }}</p>
      }

      <button type="submit" class="pm-cta mt-[22px]" [disabled]="form.invalid || isPending()">
        @if (isPending()) { {{ 'REGISTER.SUBMITTING' | translate }} }
        @else { {{ 'REGISTER.SUBMIT' | translate }} }
      </button>
    </form>

    <!-- Footnote -->
    <p class="mt-5 mb-2 text-center text-[11px] leading-[1.5] text-muted/70">
      {{ 'REGISTER.CONSENT_SHORT' | translate }}
    </p>

  </div>

</ion-content>
