<pm-header />

<ion-content>
  <div class="min-h-full flex flex-col">
    <!-- Hero -->
    <div class="relative overflow-hidden px-6 pt-10 pb-6 bg-pm-navy-dark">
      <div class="absolute inset-0 bg-gradient-to-br from-pm-orange/10 to-transparent pointer-events-none"></div>
      <h1 class="text-4xl font-black tracking-tight text-white leading-tight">
        Practical<br>
        <span class="text-pm-orange">Machinist</span><br>
        Trivia.
      </h1>
      <p class="mt-3 text-sm text-slate-400 max-w-xs">
        {{ 'REGISTER.HERO_SUBTITLE' | translate }}
      </p>
    </div>

    <!-- Form card -->
    <div class="flex-1 px-4 -mt-2">
      <div class="pm-card mt-4">
        <h2 class="text-lg font-bold text-white mb-6">{{ 'REGISTER.FORM_TITLE' | translate }}</h2>

        <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="pm-input__label">{{ 'REGISTER.FIRST_NAME' | translate }} *</label>
              <input class="pm-input" type="text" formControlName="firstName" autocomplete="given-name" />
            </div>
            <div>
              <label class="pm-input__label">{{ 'REGISTER.LAST_NAME' | translate }} *</label>
              <input class="pm-input" type="text" formControlName="lastName" autocomplete="family-name" />
            </div>
          </div>

          <div>
            <label class="pm-input__label">{{ 'REGISTER.EMAIL' | translate }} *</label>
            <input class="pm-input" type="email" formControlName="email" autocomplete="email" />
          </div>

          <div>
            <label class="pm-input__label">{{ 'REGISTER.COMPANY' | translate }} *</label>
            <input class="pm-input" type="text" formControlName="company" autocomplete="organization" />
          </div>

          <div>
            <label class="pm-input__label">{{ 'REGISTER.PHONE' | translate }}</label>
            <input class="pm-input" type="tel" formControlName="phone" autocomplete="tel" />
          </div>

          <label class="flex items-start gap-3 cursor-pointer">
            <input type="checkbox" formControlName="consent" class="mt-1 accent-pm-orange" />
            <span class="text-xs text-slate-400 leading-relaxed">
              {{ 'REGISTER.CONSENT' | translate }}
            </span>
          </label>

          @if (hasError()) {
            <p class="pm-error">{{ errorMessage() ?? ('REGISTER.ERROR_GENERIC' | translate) }}</p>
          }

          <button
            type="submit"
            class="pm-btn-primary mt-2"
            [disabled]="form.invalid || isPending()">
            @if (isPending()) {
              {{ 'REGISTER.SUBMITTING' | translate }}
            } @else {
              {{ 'REGISTER.SUBMIT' | translate }}
            }
          </button>

        </form>
      </div>

      <p class="text-center text-xs text-slate-500 mt-6 mb-8">
        {{ 'REGISTER.LEADERBOARD_LINK_PRE' | translate }}
        <a class="text-pm-orange" routerLink="/leaderboard">{{ 'REGISTER.LEADERBOARD_LINK' | translate }}</a>
      </p>
    </div>
  </div>
</ion-content>
