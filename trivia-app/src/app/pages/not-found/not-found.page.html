<ion-content [fullscreen]="true">
  <div class="min-h-full flex flex-col bg-white md:bg-navy">

    <pm-header class="flex-none relative z-20" />
    <div class="hidden lg:block flex-none relative z-20 h-px bg-white/10"></div>

    <div class="w-full mx-auto flex-1 flex flex-col items-center px-2 py-5 lg:py-16">
      <div class="w-full max-w-[520px] bg-white rounded-[24px] shadow-[0_12px_40px_-8px_rgba(15,23,41,0.12)]
                  px-4 py-8 xs:px-8 xs:py-10 text-center">

        <p class="text-[15px] font-black text-orange mb-2">404</p>
        <h1 class="text-[22px] lg:text-[26px] font-black text-ink mb-3">{{ 'NOT_FOUND.TITLE' | translate }}</h1>
        <p class="text-[15px] text-muted mb-6">{{ 'NOT_FOUND.BODY' | translate }}</p>

        <a routerLink="/register" class="text-orange font-bold underline underline-offset-2 hover:opacity-80 text-[14px]">
          {{ 'NOT_FOUND.BACK_TO_PLAY' | translate }}
        </a>
      </div>
    </div>

  </div>
</ion-content>
