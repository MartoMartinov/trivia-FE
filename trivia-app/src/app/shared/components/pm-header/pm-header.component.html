<header class="pm-bar">
  <div class="flex items-center gap-3">
    <img class="pm-bar-logo" src="assets/pm-logo.png" alt="Practical Machinist" />
    <span class="w-px h-6 lg:h-7 bg-white/25"></span>
    <span class="pm-bar-tag">{{ tag }}</span>
  </div>
  @if (sponsorLogoUrl()) {
    <img [src]="sponsorLogoUrl()" alt="Sponsor" class="h-7 lg:h-9 w-auto object-contain" />
  }
</header>
